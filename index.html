<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON链接管理系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui, -apple-system}
.container{max-width:1200px;margin:24px auto;padding:0 16px}
.card{border:1px solid #e5e7eb;border-radius:10px;padding:20px;margin:16px 0;background:#fff}
input,textarea{width:100%;padding:11px 12px;margin:8px 0;border:1px solid #d1d5db;border-radius:6px;font-size:14px}
button{width:100%;padding:11px;border:none;border-radius:6px;background:#1677ff;color:#fff;cursor:pointer;margin:8px 0;font-size:14px}
.btn-danger{background:#f53f3f}
.btn-sm{width:auto;padding:6px 12px;margin:0}
.tab{display:none}
.tab.active{display:block}
.tip-warning{color:#f53f3f}
pre{background:#f7f8fa;padding:12px;overflow:auto;border-radius:6px;white-space:pre-wrap}
.flex-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.flex-row input{flex:1;margin:0}
h2,h3{margin-bottom:12px;color:#1f2937}
p{margin:6px 0;color:#4b5563}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
// 统一请求封装，全部调用根目录functions.js
const API_FILE = '/functions.js';
let token = localStorage.getItem('token') || null;
let userInfo = null;
let userLinkMax = 0;
let userLinkList = [];

async function request(apiName, method = 'GET', body = null) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers.Authorization = `Bearer ${token}`;
  const opt = { method, headers };
  if (body) opt.body = JSON.stringify(body);
  try {
    const res = await fetch(`${API_FILE}/${apiName}`, opt);
    const data = await res.json();
    return data;
  } catch (err) {
    alert('网络请求失败：' + err.message);
    return { code: -1, msg: err.message };
  }
}

// 页面入口渲染
async function render() {
  const app = document.getElementById('app');
  if (!token) {
    app.innerHTML = renderLoginPanel();
    return;
  }
  const linkRes = await request('myList');
  if (linkRes.code === 401) {
    logout();
    return;
  }
  userLinkMax = linkRes.maxLinkCount;
  userLinkList = linkRes.data;
  userInfo = JSON.parse(localStorage.getItem('userInfo'));
  app.innerHTML = renderMainLayout();
  if (!userInfo.emailVerified) {
    showEmailVerifyTip();
    return;
  }
  if (!userInfo.hasTotp) {
    setTimeout(()=>alert('温馨提示：您未绑定2FA二次验证，建议前往设置页面绑定'), 500);
  }
  renderLinkListHtml();
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('userInfo');
  token = null;
  userInfo = null;
  render();
}

function renderLoginPanel() {
  return `
  <div class="card">
    <h2>账号登录</h2>
    <div id="loginBox">
      <input type="email" id="loginEmail" placeholder="注册邮箱">
      <input type="password" id="loginPwd" placeholder="登录密码">
      <input type="text" id="loginTotp" placeholder="2FA验证码（未绑定留空）">
      <button onclick="handleLogin()">登录系统</button>
      <p>暂无账号？<button class="btn-sm" onclick="switchToReg()">立即注册</button></p>
    </div>
    <div id="regBox" style="display:none;margin-top:16px;border-top:1px solid #eee;padding-top:16px">
      <h3>新用户注册</h3>
      <input type="email" id="regEmail" placeholder="填写邮箱账号">
      <input type="password" id="regPwd" placeholder="设置登录密码">
      <button onclick="handleRegister()">提交注册</button>
      <p>已有账号？<button class="btn-sm" onclick="switchToLogin()">返回登录</button></p>
    </div>
  </div>
  `;
}
function switchToReg(){
  document.getElementById('loginBox').style.display='none';
  document.getElementById('regBox').style.display='block';
}
function switchToLogin(){
  document.getElementById('loginBox').style.display='block';
  document.getElementById('regBox').style.display='none';
}

async function handleRegister() {
  const email = document.getElementById('regEmail').value.trim();
  const pwd = document.getElementById('regPwd').value.trim();
  if (!email || !pwd) return alert('邮箱和密码不能为空');
  const res = await request('register', 'POST', { email, password: pwd });
  alert(res.msg);
  if (res.code === 200) switchToLogin();
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd = document.getElementById('loginPwd').value.trim();
  const totp = document.getElementById('loginTotp').value.trim();
  if (!email || !pwd) return alert('邮箱密码必填');
  const res = await request('login', 'POST', { email, password: pwd, totpCode: totp });
  if (res.code !== 200) return alert(res.msg);
  localStorage.setItem('token', res.token);
  localStorage.setItem('userInfo', JSON.stringify(res.user));
  token = res.token;
  userInfo = res.user;
  render();
}

async function showEmailVerifyTip() {
  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="card tip-warning">
    <h3>邮箱未验证，所有功能已锁定</h3>
    <p>请完成邮箱验证后使用管理功能</p>
    <button onclick="sendVerifyCode()">发送验证码至邮箱 ${userInfo.email}</button>
    <input type="text" id="emailCodeInput" placeholder="6位数字验证码">
    <button onclick="submitEmailVerify()">确认验证邮箱</button>
    <button class="btn-danger" onclick="logout()">退出登录</button>
  </div>
  `;
}
async function sendVerifyCode() {
  const res = await request('sendCode', 'POST', { email: userInfo.email });
  alert(res.msg);
}
async function submitEmailVerify() {
  const code = document.getElementById('emailCodeInput').value.trim();
  if (!code) return alert('请输入验证码');
  const res = await request('verifyEmail', 'POST', { email: userInfo.email, code });
  alert(res.msg);
  render();
}

function renderMainLayout() {
  let adminBtn = '';
  if (userInfo.isSuper) {
    adminBtn = `<button onclick="openUserManagePanel()">用户管理（超管）</button>`;
  }
  return `
  <div>
    <div class="flex-row" style="margin-bottom:16px">
      <button onclick="switchTab('link')">链接管理</button>
      <button onclick="switchTab('totp')">2FA安全设置</button>
      ${adminBtn}
      <button class="btn-danger" onclick="logout()">退出登录</button>
    </div>
    <div id="tabLink" class="tab active">${renderLinkEditPanel()}</div>
    <div id="tabTotp" class="tab">${renderTotpPanel()}</div>
    <div id="tabUser" class="tab"></div>
  </div>
  `;
}
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById(`tab${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.add('active');
}

function renderLinkEditPanel() {
  let quotaText = '';
  if (userInfo.isSuper) {
    quotaText = '<p>您是超级管理员，链接无创建数量限制</p>';
  } else {
    const remain = userLinkMax - userLinkList.length;
    quotaText = `<p class="tip-warning">链接配额：${userLinkMax}条，已创建${userLinkList.length}条，剩余可创建${remain}条</p>`;
  }
  return `
  <div class="card">
    <h3>新建JSON访问链接</h3>
    ${quotaText}
    <input id="linkPathInput" placeholder="访问路径（英文小写，如demo）">
    <input id="linkPwdInput" placeholder="访问密码（外部访问需携带）">
    <textarea id="linkJsonInput" rows="7" placeholder="标准JSON内容，例：{"name":"test"}"></textarea>
    <button onclick="saveNewLink()">保存链接</button>
  </div>
  <div class="card">
    <h3>我的全部链接</h3>
    <div id="linkListBox"></div>
  </div>
  `;
}

function renderLinkListHtml() {
  const box = document.getElementById('linkListBox');
  if (!box) return;
  if (userLinkList.length === 0) {
    box.innerHTML = '<p>暂无创建的链接</p>';
    return;
  }
  let html = '';
  userLinkList.forEach(item=>{
    const jsonStr = JSON.stringify(JSON.parse(item.jsonData), null, 2);
    html += `
    <div style="border:1px solid #eee;padding:12px;border-radius:8px;margin:10px 0">
      <p>公开访问地址：<code>/functions.js/out/${item.pathName}?pwd=你的访问密码</code></p>
      <pre>${jsonStr}</pre>
      <div class="flex-row">
        <button class="btn-sm btn-danger" onclick="delLink('${item.pathName}')">删除该链接</button>
      </div>
    </div>
    `;
  });
  box.innerHTML = html;
}

async function saveNewLink() {
  const path = document.getElementById('linkPathInput').value.trim();
  const pwd = document.getElementById('linkPwdInput').value.trim();
  const jsonTxt = document.getElementById('linkJsonInput').value.trim();
  if (!path || !pwd || !jsonTxt) return alert('路径、访问密码、JSON内容全部必填');
  try {
    JSON.parse(jsonTxt);
  } catch (e) {
    return alert('JSON格式错误，请修正后重试');
  }
  const res = await request('linkSave', 'POST', {
    linkId: null,
    pathName: path,
    accessPwd: pwd,
    jsonData: jsonTxt
  });
  alert(res.msg);
  render();
}

async function delLink(pathName) {
  if (!confirm(`确认删除链接 /functions.js/out/${pathName}？删除后无法恢复`)) return;
  const res = await request('linkDel', 'POST', { pathName });
  alert(res.msg);
  render();
}

function renderTotpPanel() {
  const bindStatus = userInfo.hasTotp ? '已绑定' : '未绑定';
  return `
  <div class="card">
    <h3>二次验证 TOTP 2FA 设置</h3>
    <p>当前状态：${bindStatus}</p>
    <button onclick="initTotpSecret()">获取绑定密钥</button>
    <div id="totpQrBox" style="margin:10px 0"></div>
    <input type="text" id="totpCodeInput" placeholder="输入验证器6位数字">
    <button onclick="confirmBindTotp()">确认绑定2FA</button>
  </div>
  `;
}
async function initTotpSecret() {
  const res = await request('getTotpInit');
  if (res.code !== 200) return alert(res.msg);
  document.getElementById('totpQrBox').innerHTML = `
  <p>密钥：${res.secret}</p>
  <p>导入链接：${res.otpUrl}</p>
  <p>复制密钥到谷歌验证器/微软验证器添加账号</p>
  `;
}
async function confirmBindTotp() {
  const code = document.getElementById('totpCodeInput').value.trim();
  if (!code) return alert('请输入6位验证码');
  const res = await request('bindTotp', 'POST', { verifyCode: code });
  alert(res.msg);
  render();
}

async function openUserManagePanel() {
  const res = await request('allUsers');
  if (res.code !== 200) return alert(res.msg);
  let html = '<h3>全部用户管理（可修改链接配额）</h3>';
  res.data.forEach(u=>{
    html += `
    <div class="card">
      <p>邮箱账号：${u.email}</p>
      <p>UID：${u.uid}</p>
      <p>超级管理员：${u.isSuper?'是':'否'}</p>
      <p>邮箱验证：${u.emailVerified?'已验证':'未验证'}</p>
      <p>2FA绑定：${u.hasTotp?'已绑定':'未绑定'}</p>
      <div class="flex-row">
        <span>链接最大配额：</span>
        <input type="number" id="quota_${u.email}" value="${u.maxLinkCount}" style="width:140px">
        <button class="btn-sm" onclick="saveUserQuota('${u.email}')">保存修改</button>
      </div>
    </div>
    `;
  });
  document.getElementById('tabUser').innerHTML = html;
  switchTab('user');
}
async function saveUserQuota(email) {
  const input = document.getElementById(`quota_${email}`);
  const num = parseInt(input.value);
  if (isNaN(num) || num < 0) return alert('配额必须为0以上数字');
  const res = await request('setUserMaxLink', 'POST', { targetEmail: email, newMax: num });
  alert(res.msg);
  openUserManagePanel();
}

render();
</script>
</body>
</html>
